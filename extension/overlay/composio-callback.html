<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>klo · connecting</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">
  <style>
    /* Reached after Composio redirects back from the toolkit's OAuth.
       Parses `?toolkit=&connectedAccountId=` and asks background to
       finalize. Surface mirrors iOS SignInScreen: always-dark, cream
       wordmark, olive bloom, brand-colored progress arc that morphs
       into a checkmark on success. */
    :root {
      color-scheme: dark;
      --klo-black:   #0A0A0A;
      --klo-cream:   #F1ECE5;
      --klo-olive:   #A8C152;
      --brand:       #A8C152;
      --klo-mono:    "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;
      --error:       #DC2626;
    }
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--klo-black);
      color: var(--klo-cream);
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      position: relative;
      overflow: hidden;
    }
    /* Soft brand-tinted bloom anchored to bottom. Colors flip to the
       toolkit's brand swatch via the --brand custom prop set by JS. */
    body:before {
      content: "";
      position: fixed;
      left: 50%;
      bottom: -120px;
      transform: translateX(-50%);
      width: 720px;
      height: 360px;
      background: radial-gradient(ellipse at center,
                    color-mix(in srgb, var(--brand) 24%, transparent) 0%,
                    color-mix(in srgb, var(--brand) 10%, transparent) 40%,
                    transparent 72%);
      filter: blur(18px);
      pointer-events: none;
      z-index: 0;
      transition: background 320ms;
    }
    .card {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      text-align: center;
      max-width: 380px;
    }
    .glyph {
      height: 28px;
      opacity: 0.92;
      user-select: none;
      -webkit-user-drag: none;
    }
    .tagline {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      margin-top: 2px;
    }
    .tagline-rule {
      width: 28px;
      height: 0.5px;
      background: color-mix(in srgb, var(--brand) 55%, transparent);
      transition: background 320ms;
    }
    .tagline-text {
      font-family: var(--klo-mono);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: rgba(241, 236, 229, 0.55);
      line-height: 1;
    }
    /* Brand tile — bigger and centered. Doubles as the progress
       indicator: a colored arc rings the tile while the POST is in
       flight; on success the arc completes a full circle and a
       checkmark draws into it. */
    .brand-wrap {
      position: relative;
      width: 92px;
      height: 92px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-top: 4px;
    }
    .brand-tile {
      width: 64px;
      height: 64px;
      border-radius: 18px;
      background: color-mix(in srgb, var(--brand) 12%, rgba(241,236,229,0.06));
      display: inline-flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      transition: background 320ms;
    }
    .brand-tile img { width: 40px; height: 40px; object-fit: contain; }
    .brand-tile.monogram {
      color: var(--brand);
      font-family: var(--klo-mono);
      font-size: 22px;
      font-weight: 600;
    }
    /* Progress arc — sits inside .brand-wrap, behind the tile. SVG
       circle with stroke-dasharray animated so it sweeps in. */
    .progress-ring {
      position: absolute;
      inset: 0;
      transform: rotate(-90deg);
      pointer-events: none;
    }
    .progress-ring circle {
      fill: none;
      stroke: var(--brand);
      stroke-width: 1.5;
      stroke-linecap: round;
      cx: 46;
      cy: 46;
      r: 44;
      stroke-dasharray: 276.46;       /* 2 * π * 44 */
      stroke-dashoffset: 276.46;
      transition: stroke-dashoffset 280ms ease, opacity 220ms;
      opacity: 0.65;
    }
    .progress-ring.is-spinning {
      animation: ring-spin 1.4s linear infinite;
    }
    .progress-ring.is-spinning circle {
      stroke-dashoffset: 207;          /* ~25% arc visible */
    }
    .progress-ring.is-complete circle {
      stroke-dashoffset: 0;            /* full ring */
      opacity: 1;
    }
    @keyframes ring-spin { to { transform: rotate(270deg); } }

    /* Checkmark drawn into the tile on success. Hidden by default,
       fades in as the ring completes. */
    .brand-check {
      position: absolute;
      width: 24px;
      height: 24px;
      display: none;
      align-items: center;
      justify-content: center;
      background: var(--brand);
      border-radius: 50%;
      box-shadow: 0 4px 14px color-mix(in srgb, var(--brand) 50%, transparent);
      bottom: 4px;
      right: 4px;
    }
    .brand-check::after {
      content: "";
      width: 8px; height: 13px;
      border-right: 2px solid var(--klo-black);
      border-bottom: 2px solid var(--klo-black);
      transform: rotate(45deg) translate(-1px, -1px);
    }
    .card.is-success .brand-check {
      display: inline-flex;
      animation: check-pop 320ms cubic-bezier(0.34, 1.6, 0.4, 1) both;
    }
    @keyframes check-pop {
      0%   { transform: scale(0.5); opacity: 0; }
      100% { transform: scale(1);   opacity: 1; }
    }

    h1 {
      font-size: 28px;
      font-weight: 300;
      letter-spacing: -0.025em;
      line-height: 1.1;
      margin: 6px 0 0;
      transition: color 220ms;
    }
    .lede {
      font-family: var(--klo-mono);
      font-size: 12px;
      letter-spacing: 0.04em;
      color: rgba(241, 236, 229, 0.70);
      line-height: 1.55;
      margin: 0;
      max-width: 320px;
      transition: color 220ms;
    }
    .countdown {
      font-family: var(--klo-mono);
      font-size: 10px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: rgba(241, 236, 229, 0.40);
      margin-top: 4px;
      display: none;
    }
    .card.is-success .countdown { display: block; }

    .status {
      margin-top: 4px;
      padding: 10px 14px;
      font-family: var(--klo-mono);
      font-size: 11px;
      letter-spacing: 0.02em;
      border-radius: 10px;
      display: none;
      line-height: 1.5;
      max-width: 300px;
    }
    .status.err { display: block; border: 1px solid rgba(220, 38, 38, 0.30); color: var(--error); background: rgba(220, 38, 38, 0.06); }
    .footer {
      margin-top: 14px;
      font-family: var(--klo-mono);
      font-size: 11px;
      letter-spacing: 0.03em;
      color: rgba(241, 236, 229, 0.40);
    }
  </style>
</head>
<body>
  <div class="card" id="card">
    <img class="glyph" src="klo-logo-white.png" alt="klo" draggable="false" />
    <div class="tagline" aria-hidden="true">
      <span class="tagline-rule"></span>
      <span class="tagline-text" id="tagline-text">FINISHING CONNECTION</span>
      <span class="tagline-rule"></span>
    </div>
    <div class="brand-wrap">
      <svg class="progress-ring is-spinning" id="progress-ring" viewBox="0 0 92 92" aria-hidden="true">
        <circle></circle>
      </svg>
      <div class="brand-tile" id="brand-tile"></div>
      <div class="brand-check" aria-hidden="true"></div>
    </div>
    <h1 id="title">connecting</h1>
    <p class="lede" id="subtitle">storing the link, takes a moment.</p>
    <p class="countdown" id="countdown">CLOSING IN 3</p>
    <div class="status" id="status"></div>
    <div class="footer">getklo.com</div>
  </div>
  <script src="../lib/composio.js"></script>
  <script src="composio-callback.js"></script>
</body>
</html>
