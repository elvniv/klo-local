<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>klo sign in</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">
  <style>
    /* Standalone tab — always-dark, mirrors iOS SignInScreen. Cream
       wordmark + rotating tagline with olive rules + outline-only
       capsule with cream Google-G disc + breathing olive glow +
       monospace legal. Single source of truth: KloColors + the iOS
       SignInScreen layout. */
    :root {
      color-scheme: dark;
      --klo-black:   #0A0A0A;
      --klo-cream:   #F1ECE5;
      --klo-olive:   #A8C152;
      --klo-oliveHi: #BED56F;
      --klo-mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;
      --error:       #DC2626;
    }
    *, *::before, *::after { box-sizing: border-box; }
    ::selection { background: var(--klo-olive); color: var(--klo-black); }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--klo-black);
      color: var(--klo-cream);
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      position: relative;
      overflow: hidden;
    }
    /* Soft olive bloom anchored to bottom — CSS echo of MiniFireView. */
    body:before {
      content: "";
      position: fixed;
      left: 50%;
      bottom: -120px;
      transform: translateX(-50%);
      width: 720px;
      height: 360px;
      background: radial-gradient(ellipse at center,
                    rgba(168,193,82,0.22) 0%,
                    rgba(168,193,82,0.09) 40%,
                    transparent 72%);
      filter: blur(18px);
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      width: 100%;
      max-width: 380px;
      padding: 28px 24px 24px;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      text-align: center;
    }

    .glyph {
      height: 36px;
      width: auto;
      opacity: 0.92;
      user-select: none;
      -webkit-user-drag: none;
    }

    /* Metadata tagline: olive rules + wide-tracked monospace text. */
    .tagline {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      margin-top: 2px;
    }
    .tagline-rule {
      width: 28px;
      height: 0.5px;
      background: rgba(168, 193, 82, 0.55);
    }
    .tagline-text {
      font-family: var(--klo-mono);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: rgba(241, 236, 229, 0.55);
      line-height: 1;
      transition: opacity 0.4s ease, transform 0.4s ease;
    }
    .tagline-text.is-fading { opacity: 0; transform: translateY(-3px); }

    /* Outline-only capsule with cream Google-G disc. */
    .cta-wrap {
      position: relative;
      margin-top: 6px;
      display: inline-flex;
      justify-content: center;
    }
    .cta-glow {
      position: absolute;
      inset: -4px;
      border-radius: 999px;
      pointer-events: none;
      animation: cta-breathe 2.4s ease-in-out infinite;
    }
    @keyframes cta-breathe {
      0%, 100% { box-shadow: 0 0 12px rgba(168,193,82,0.18), 0 0 24px rgba(168,193,82,0.08); }
      50%      { box-shadow: 0 0 22px rgba(168,193,82,0.40), 0 0 44px rgba(168,193,82,0.18); }
    }
    .cta-wrap.is-loading .cta-glow { animation: none; box-shadow: none; }

    button {
      position: relative;
      z-index: 1;
      min-width: 240px;
      padding: 12px 22px;
      background: transparent;
      color: rgba(241, 236, 229, 0.92);
      border: 0.75px solid rgba(168, 193, 82, 0.55);
      border-radius: 999px;
      font-family: inherit;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      transition: border-color 160ms, background 160ms, transform 120ms;
    }
    button:hover:not(:disabled) {
      border-color: rgba(168, 193, 82, 0.85);
      background: rgba(168, 193, 82, 0.06);
      transform: scale(1.01);
    }
    button:disabled { opacity: 0.55; cursor: default; }
    .g-disc {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--klo-cream);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 22px;
    }
    .g-disc svg { width: 13px; height: 13px; display: block; }
    .g-label {
      font-family: var(--klo-mono);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: lowercase;
      line-height: 1;
    }

    /* Spinner used by the callback handler when tokens are being
       persisted. Uses the same olive ring + cream disc vocabulary as
       the Google button so the surface feels continuous. */
    .spinner-disc {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--klo-cream);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 22px;
    }
    .spinner-disc::before {
      content: "";
      width: 13px;
      height: 13px;
      border: 1.5px solid transparent;
      border-top-color: var(--klo-black);
      border-right-color: var(--klo-black);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #callback-handler {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }
    #callback-handler.is-visible { display: flex; }
    .callback-line {
      font-family: var(--klo-mono);
      font-size: 12px;
      letter-spacing: 0.04em;
      color: rgba(241, 236, 229, 0.70);
      line-height: 1.5;
    }

    .status {
      margin-top: 4px;
      padding: 10px 14px;
      font-family: var(--klo-mono);
      font-size: 11px;
      letter-spacing: 0.02em;
      border-radius: 10px;
      display: none;
      line-height: 1.5;
      max-width: 300px;
    }
    .status.ok   { display: block; border: 1px solid rgba(168, 193, 82, 0.35); color: var(--klo-olive); background: rgba(168, 193, 82, 0.06); }
    .status.err  { display: block; border: 1px solid rgba(220, 38, 38, 0.30); color: var(--error);    background: rgba(220, 38, 38, 0.06); }
    .status.info { display: block; border: 1px solid rgba(241, 236, 229, 0.14); color: rgba(241,236,229,0.85); background: #161616; }

    .footer {
      margin-top: 14px;
      font-family: var(--klo-mono);
      font-size: 11px;
      letter-spacing: 0.03em;
      color: rgba(241, 236, 229, 0.40);
      text-align: center;
      line-height: 1.5;
      max-width: 280px;
    }
    .footer a {
      color: rgba(241, 236, 229, 0.75);
      text-decoration: underline;
      text-underline-offset: 3px;
      text-decoration-thickness: 0.5px;
    }
    .footer a:hover { color: var(--klo-cream); }
  </style>
</head>
<body>
  <div class="card">
    <img class="glyph" src="klo-logo-white.png" alt="klo" draggable="false" />
    <div class="tagline" aria-hidden="true">
      <span class="tagline-rule"></span>
      <span class="tagline-text" id="tagline-text">activate klo on this browser</span>
      <span class="tagline-rule"></span>
    </div>

    <!-- Title + subtitle are populated by auth-callback.js when the
         redirect completes. Hidden by default so the initial paint
         shows the Google button cleanly. -->
    <h1 id="title" hidden style="display:none"></h1>
    <p id="subtitle" hidden style="display:none"></p>

    <div id="signin-form">
      <div class="cta-wrap" id="cta-wrap">
        <button id="send-btn" type="button">
          <span class="g-disc" aria-hidden="true">
            <svg viewBox="0 0 18 18">
              <path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.72v2.26h2.92c1.7-1.57 2.68-3.88 2.68-6.62z"/>
              <path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.92-2.26c-.81.54-1.84.86-3.04.86-2.34 0-4.32-1.58-5.03-3.7H.96v2.32A9 9 0 0 0 9 18z"/>
              <path fill="#FBBC05" d="M3.97 10.72A5.4 5.4 0 0 1 3.68 9c0-.6.1-1.18.29-1.72V4.96H.96A9 9 0 0 0 0 9c0 1.45.35 2.82.96 4.04l3.01-2.32z"/>
              <path fill="#EA4335" d="M9 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.58C13.46.89 11.43 0 9 0A9 9 0 0 0 .96 4.96l3.01 2.32C4.68 5.16 6.66 3.58 9 3.58z"/>
            </svg>
          </span>
          <span class="g-label" id="send-btn-label">continue with google</span>
        </button>
        <span class="cta-glow" aria-hidden="true"></span>
      </div>
    </div>

    <div id="callback-handler">
      <div class="spinner-disc" aria-hidden="true"></div>
      <p class="callback-line">activating klo on this browser</p>
    </div>

    <div id="status" class="status"></div>

    <div class="footer">
      by continuing you agree to our <a href="https://getklo.com/terms" target="_blank">terms</a> and <a href="https://getklo.com/privacy" target="_blank">privacy policy</a>
    </div>
  </div>

  <script src="auth-callback.js"></script>
</body>
</html>
